<\!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פיני — עוזר כספי</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #2a2520;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rubik', system-ui, sans-serif;
    }
    .phone {
      width: 390px;
      height: 844px;
      border-radius: 48px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 60px 120px rgba(0,0,0,0.4), 0 0 0 10px #1F1A15;
    }
    @media (max-width: 440px) {
      .phone { border-radius: 0; width: 100vw; height: 100vh; }
      body { background: #FDDDE8; }
    }
    input, button { font-family: 'Rubik', system-ui, sans-serif; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">

const F = {
  cream: '#F7F5E8', creamDark: '#EFEADA',
  ink: '#1F1A15', inkSoft: '#4A4237', inkMute: '#8A8070',
  line: 'rgba(31,26,21,0.08)', lineSoft: 'rgba(31,26,21,0.05)',
  rose: '#FDDDE8', roseDeep: '#F9C6D7', pink: '#C85A8A', pinkSoft: '#E89AB3',
  mint: '#D6EEE0', mintDeep: '#BEE3CB', green: '#5B8E6F', greenSoft: '#A7C9B4',
  lavender: '#E8ECFF', lavenderDeep: '#D4DBFA', blue: '#5A6FB8', blueSoft: '#A5B0D8',
  income: '#5B8E6F', incomeTint: '#DDEEDF',
  expense: '#D47070', expenseTint: '#FADEDC',
  gold: '#C9A24D', goldTint: '#F3E7C7',
  font: "'Rubik', system-ui, sans-serif",
};

const CATS = {
  food:      { label: 'מסעדות', icon: 'coffee',  tint: '#FCE6D4', ink: '#B5662E' },
  grocery:   { label: 'סופר',   icon: 'cart',    tint: '#E3EEDB', ink: '#5E8040' },
  rent:      { label: 'שכירות', icon: 'home',    tint: '#E5E2F5', ink: '#5A4E9A' },
  transport: { label: 'תחבורה', icon: 'car',     tint: '#DCE9F2', ink: '#4A7390' },
  utility:   { label: 'חשבונות',icon: 'bolt',    tint: '#F6E6C1', ink: '#9B7C2E' },
  salary:    { label: 'משכורת', icon: 'wallet',  tint: '#DDEEDF', ink: '#3E7354' },
  gift:      { label: 'מתנות',  icon: 'gift',    tint: '#F9DEE8', ink: '#A3446A' },
  phone:     { label: 'סלולר',  icon: 'phone',   tint: '#E4E9FA', ink: '#4A5BA4' },
  fun:       { label: 'בילויים',icon: 'heart',   tint: '#FCE1EC', ink: '#AF4775' },
  save:      { label: 'חיסכון', icon: 'piggy',   tint: '#F3E7C7', ink: '#8A6E2C' },
};

const TXS = [
  { g: 'היום · 14 בנובמבר', items: [
    { cat:'food', t:'לחמים', s:'08:12 · כרטיס אשראי', a:-68 },
    { cat:'salary', t:'משכורת · סטארטאפ', s:'07:30 · העברה', a:12400 },
  ]},
  { g: 'אתמול', items: [
    { cat:'grocery', t:'שופרסל דיל', s:'מכולת', a:-214 },
    { cat:'transport', t:'Gett', s:'תחבורה · ×3', a:-82 },
    { cat:'fun', t:'סינמה סיטי', s:'בילוי', a:-96 },
  ]},
  { g: '12 בנובמבר', items: [
    { cat:'rent', t:'שכר דירה · נובמבר', s:'הוראת קבע', a:-3200 },
    { cat:'phone', t:'Bezeq', s:'אינטרנט', a:-99, flag:'זוהה כחדש' },
    { cat:'utility', t:'חברת חשמל', s:'חשבונות', a:-288 },
  ]},
];

function Icon({ name, size=24, color=F.ink, style={} }) {
  const s = { width: size, height: size, ...style };
  const p = { stroke: color, strokeWidth: '1.6', fill: 'none', strokeLinecap: 'round', strokeLinejoin: 'round' };
  const icons = {
    chat:     <path {...p} d="M5 10c0-3 2.5-5 7-5s7 2 7 5-2.5 5-7 5c-1 0-2-.1-2.8-.3L5 17l.8-3.2C5.3 12.9 5 11.5 5 10z"/>,
    insights: <path {...p} d="M5 19V9M12 19V5M19 19v-7"/>,
    data:     <>{<rect {...p} x="4" y="4" width="7" height="7" rx="1.5"/>}{<rect {...p} x="13" y="4" width="7" height="4" rx="1.5"/>}{<rect {...p} x="13" y="10" width="7" height="10" rx="1.5"/>}{<rect {...p} x="4" y="13" width="7" height="7" rx="1.5"/>}</>,
    add:      <>{<circle {...p} cx="12" cy="12" r="8"/>}{<path {...p} d="M12 8v8M8 12h8"/>}</>,
    camera:   <>{<path {...p} d="M4 8h3l2-2h6l2 2h3v10H4z"/>}{<circle {...p} cx="12" cy="13" r="3"/>}</>,
    mic:      <>{<rect {...p} x="9.5" y="4" width="5" height="10" rx="2.5"/>}{<path {...p} d="M6 11a6 6 0 0012 0M12 17v3"/>}</>,
    plus:     <path {...p} d="M12 5v14M5 12h14"/>,
    arrow:    <path {...p} d="M5 12h14M13 6l6 6-6 6"/>,
    arrowL:   <path {...p} d="M19 12H5M11 6l-6 6 6 6"/>,
    send:     <path {...p} d="M20 4L4 11l7 2 2 7z"/>,
    filter:   <path {...p} d="M4 5h16M7 12h10M10 19h4"/>,
    search:   <>{<circle {...p} cx="11" cy="11" r="6"/>}{<path {...p} d="M20 20l-4.5-4.5"/>}</>,
    bell:     <>{<path {...p} d="M6 15V10a6 6 0 0112 0v5l1.5 2H4.5z"/>}{<path {...p} d="M10 19a2 2 0 004 0"/>}</>,
    wallet:   <>{<rect {...p} x="3" y="6" width="18" height="13" rx="2.5"/>}{<path {...p} d="M3 10h18M16 14.5h2"/>}</>,
    target:   <>{<circle {...p} cx="12" cy="12" r="8"/>}{<circle {...p} cx="12" cy="12" r="4"/>}{<circle cx="12" cy="12" r="1" fill={color}/>}</>,
    sparkle:  <path {...p} d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5L18 18M6 18l2.5-2.5M15.5 8.5L18 6"/>,
    receipt:  <path {...p} d="M6 3h12v18l-2-1.5-2 1.5-2-1.5-2 1.5-2-1.5L6 21zM9 8h6M9 12h6M9 16h4"/>,
    heart:    <path {...p} d="M12 20s-7-4.5-7-10a4 4 0 017-2.5A4 4 0 0119 10c0 5.5-7 10-7 10z"/>,
    home:     <path {...p} d="M4 11l8-7 8 7v9a1 1 0 01-1 1h-4v-6h-6v6H5a1 1 0 01-1-1z"/>,
    coffee:   <>{<path {...p} d="M5 9h13v6a4 4 0 01-4 4H9a4 4 0 01-4-4zM18 10h2a2 2 0 010 4h-2"/>}{<path {...p} d="M8 4v2M12 4v2"/>}</>,
    cart:     <path {...p} d="M3 4h2l2.5 11h11L21 8H6M9 20a1 1 0 100-2 1 1 0 000 2zM18 20a1 1 0 100-2 1 1 0 000 2z"/>,
    car:      <path {...p} d="M5 14l1.5-5h11L19 14M3 14h18v4h-2v-1H5v1H3zM7 18a1 1 0 100-2 1 1 0 000 2zM17 18a1 1 0 100-2 1 1 0 000 2z"/>,
    bolt:     <path {...p} d="M13 3L5 14h6l-1 7 8-11h-6z"/>,
    gift:     <>{<rect {...p} x="3" y="9" width="18" height="11" rx="1"/>}{<path {...p} d="M3 13h18M12 9v11M8 9a2.5 2.5 0 010-5c2 0 4 2.5 4 5M16 9a2.5 2.5 0 000-5c-2 0-4 2.5-4 5"/>}</>,
    phone:    <>{<rect {...p} x="7" y="3" width="10" height="18" rx="2"/>}{<path {...p} d="M11 18h2"/>}</>,
    lock:     <>{<rect {...p} x="5" y="10" width="14" height="10" rx="2"/>}{<path {...p} d="M8 10V7a4 4 0 018 0v3"/>}</>,
    check:    <path {...p} d="M5 12l4 4 10-10"/>,
    close:    <path {...p} d="M6 6l12 12M18 6L6 18"/>,
    dots:     <><circle cx="6" cy="12" r="1.5" fill={color}/><circle cx="12" cy="12" r="1.5" fill={color}/><circle cx="18" cy="12" r="1.5" fill={color}/></>,
    calendar: <>{<rect {...p} x="4" y="5" width="16" height="15" rx="2"/>}{<path {...p} d="M4 10h16M8 3v4M16 3v4"/>}</>,
    trend:    <path {...p} d="M3 17l5-5 4 4 7-9M16 7h4v4"/>,
    piggy:    <>{<path {...p} d="M5 13c0-3.5 3-6 7-6 1 0 2 .1 3 .4L17 6l1 2c1.5 1 2 2.5 2 4 0 2-1 3.5-2.5 4.5L17 20h-3l-.5-1.5h-3L10 20H7l-1-3C5.5 16.3 5 14.8 5 13z"/>}{<circle cx="9" cy="12" r=".8" fill={color}/>}{<path {...p} d="M14 10h2"/>}</>,
    users:    <>{<circle {...p} cx="9" cy="8" r="3.5"/>}{<path {...p} d="M3 20v-1a5 5 0 015-5h2a5 5 0 015 5v1"/>}{<circle {...p} cx="17" cy="9" r="2.5"/>}{<path {...p} d="M15 14h1a5 5 0 015 5v1"/>}</>,
    tag:      <>{<path {...p} d="M3 12V4h8l10 10-8 8z"/>}{<circle {...p} cx="8" cy="8" r="1.5"/>}</>,
  };
  return <svg viewBox="0 0 24 24" style={s}>{icons[name] || null}</svg>;
}

function FiniMascot({ size=96, mood='happy', style={} }) {
  return (
    <svg width={size} height={size} viewBox="0 0 120 120" style={style}>
      <defs>
        <radialGradient id="finiBody" cx="40%" cy="35%" r="70%">
          <stop offset="0%" stopColor="#F7D98A"/>
          <stop offset="60%" stopColor="#E8B862"/>
          <stop offset="100%" stopColor="#C9A24D"/>
        </radialGradient>
        <radialGradient id="finiCheek" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#F5A0B8" stopOpacity="0.6"/>
          <stop offset="100%" stopColor="#F5A0B8" stopOpacity="0"/>
        </radialGradient>
      </defs>
      <ellipse cx="60" cy="108" rx="28" ry="4" fill="#1F1A15" opacity="0.08"/>
      <circle cx="60" cy="58" r="44" fill="url(#finiBody)"/>
      <circle cx="60" cy="58" r="38" fill="none" stroke="#FFFFFF" strokeOpacity="0.35" strokeWidth="1.2" strokeDasharray="2 3"/>
      <circle cx="40" cy="66" r="8" fill="url(#finiCheek)"/>
      <circle cx="80" cy="66" r="8" fill="url(#finiCheek)"/>
      {mood === 'wink'
        ? <path d="M 45.5 54 Q 48 52 50.5 54" stroke="#1F1A15" strokeWidth="1.6" fill="none" strokeLinecap="round"/>
        : <circle cx="48" cy="54" r="2.2" fill="#1F1A15"/>}
      <circle cx="72" cy="54" r="2.2" fill="#1F1A15"/>
      {mood === 'talk'
        ? <ellipse cx="60" cy="70" rx="4" ry="3" fill="#1F1A15"/>
        : <path d="M 52 68 Q 60 76 68 68" stroke="#1F1A15" strokeWidth="2.2" fill="none" strokeLinecap="round"/>}
      <path d="M60 18 L60 10" stroke="#C9A24D" strokeWidth="2" strokeLinecap="round"/>
      <path d="M60 10 L57 5 M60 10 L63 5 M60 10 L60 2" stroke="#C9A24D" strokeWidth="1.6" strokeLinecap="round"/>
      <circle cx="60" cy="1" r="2" fill="#F7D98A"/>
      {mood === 'wave' && <g transform="translate(100,50) rotate(20)"><circle r="7" fill="url(#finiBody)"/></g>}
    </svg>
  );
}

function FiniAvatar({ size=36, mood='happy' }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: 'linear-gradient(135deg, #F7D98A, #C9A24D)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: '0 2px 6px rgba(201,162,77,0.3), inset 0 1px 0 rgba(255,255,255,0.5)',
      flexShrink: 0,
    }}>
      <svg width={size*0.72} height={size*0.72} viewBox="0 0 100 100">
        <circle cx="38" cy="45" r="4" fill="#1F1A15"/>
        <circle cx="62" cy="45" r="4" fill="#1F1A15"/>
        {mood === 'talk'
          ? <ellipse cx="50" cy="62" rx="4" ry="3" fill="#1F1A15"/>
          : <path d="M 40 60 Q 50 70 60 60" stroke="#1F1A15" strokeWidth="2.6" fill="none" strokeLinecap="round"/>}
        <path d="M78 14 L78 8 M75 11 L81 11" stroke="#FFFFFF" strokeWidth="1.6" strokeLinecap="round"/>
      </svg>
    </div>
  );
}

function CatIcon({ cat, size=40, radius=12 }) {
  const c = CATS[cat] || CATS.food;
  return (
    <div style={{ width:size, height:size, borderRadius:radius, background:c.tint, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
      <Icon name={c.icon} size={size*0.55} color={c.ink}/>
    </div>
  );
}

function StatusBar({ color=F.ink }) {
  return (
    <div style={{ height:54, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'18px 28px 0', boxSizing:'border-box', position:'relative', zIndex:5, direction:'ltr' }}>
      <span style={{ fontWeight:600, fontSize:17, color }}>9:41</span>
      <div style={{ display:'flex', gap:6, alignItems:'center' }}>
        <svg width="18" height="11" viewBox="0 0 18 11">
          <rect x="0" y="7" width="3" height="4" rx="0.5" fill={color}/>
          <rect x="5" y="5" width="3" height="6" rx="0.5" fill={color}/>
          <rect x="10" y="2" width="3" height="9" rx="0.5" fill={color}/>
          <rect x="15" y="0" width="3" height="11" rx="0.5" fill={color}/>
        </svg>
        <svg width="24" height="11" viewBox="0 0 24 11">
          <rect x="0.5" y="0.5" width="20" height="10" rx="3" stroke={color} strokeOpacity="0.4" fill="none"/>
          <rect x="2" y="2" width="17" height="7" rx="1.5" fill={color}/>
        </svg>
      </div>
    </div>
  );
}

function TabBar({ active='chat', onTab }) {
  const tabs = [
    { id:'data',     label:'נתונים', icon:'data'    },
    { id:'insights', label:'תובנות', icon:'insights' },
    { id:'chat',     label:'צ׳אט',   icon:'chat'    },
  ];
  const accents = { chat: F.pink, insights: F.green, data: F.blue };
  const accent = accents[active];
  return (
    <div style={{ position:'absolute', left:0, right:0, bottom:0, zIndex:10, paddingBottom:28, paddingTop:10, background:'linear-gradient(to top, rgba(255,255,255,0.96) 60%, rgba(255,255,255,0))', backdropFilter:'blur(10px)' }}>
      <div style={{ display:'flex', justifyContent:'space-around', padding:'8px 16px' }}>
        {tabs.map(t => {
          const on = t.id === active;
          return (
            <div key={t.id} onClick={() => onTab && onTab(t.id)} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:2, minWidth:56, cursor:'pointer' }}>
              <div style={{ width:48, height:32, borderRadius:16, background: on ? accent : 'transparent', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.2s' }}>
                <Icon name={t.icon} size={22} color={on ? '#fff' : F.inkMute}/>
              </div>
              <span style={{ fontSize:11, fontWeight:on?600:400, color: on ? F.ink : F.inkMute }}>{t.label}</span>
            </div>
          );
        })}
      </div>
      <div style={{ position:'absolute', bottom:8, left:'50%', transform:'translateX(-50%)', width:139, height:5, borderRadius:100, background:'rgba(31,26,21,0.2)' }}/>
    </div>
  );
}

function ProgressDots({ i, n=5, color=F.pink }) {
  return (
    <div style={{ display:'flex', gap:6, justifyContent:'center', padding:'10px 0' }}>
      {Array.from({length:n}).map((_,k) => (
        <div key={k} style={{ width:k===i?22:6, height:6, borderRadius:3, background: k<=i ? color : 'rgba(31,26,21,0.12)', transition:'all 0.3s' }}/>
      ))}
    </div>
  );
}

function ObHeader({ step='2/5', onBack, onSkip }) {
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 20px', direction:'rtl' }}>
      <button onClick={onBack} style={{ width:40, height:40, borderRadius:20, border:'none', background:'rgba(31,26,21,0.08)', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <Icon name="arrowL" size={20} color={F.inkSoft}/>
      </button>
      <button onClick={onSkip} style={{ border:'none', background:'none', cursor:'pointer', fontSize:14, color:F.inkMute, fontFamily:F.font }}>
        {step} · דילוג
      </button>
    </div>
  );
}

function FiniBubble({ text, mood='happy' }) {
  return (
    <div style={{ display:'flex', alignItems:'flex-end', gap:8, padding:'0 20px 8px', direction:'rtl' }}>
      <FiniAvatar size={36} mood={mood}/>
      <div style={{ background:'#fff', borderRadius:'18px 18px 18px 4px', padding:'10px 14px', maxWidth:260, boxShadow:'0 2px 8px rgba(31,26,21,0.08)' }}>
        <span style={{ fontSize:14, color:F.ink, lineHeight:1.5 }}>{text}</span>
      </div>
    </div>
  );
}

// ==================== ONBOARDING WELCOME ====================
function ObWelcome({ nav }) {
  return (
    <div style={{ width:'100%', height:'100%', background:F.rose, position:'relative', overflow:'hidden', display:'flex', flexDirection:'column', alignItems:'center', fontFamily:F.font, direction:'rtl' }}>
      <div style={{ position:'absolute', top:-80, right:-60, width:300, height:300, borderRadius:'50%', background:'radial-gradient(circle, rgba(200,90,138,0.2) 0%, transparent 70%)', pointerEvents:'none' }}/>
      <div style={{ position:'absolute', bottom:100, left:-80, width:280, height:280, borderRadius:'50%', background:'radial-gradient(circle, rgba(201,162,77,0.15) 0%, transparent 70%)', pointerEvents:'none' }}/>
      <StatusBar color={F.ink}/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', paddingBottom:40 }}>
        <FiniMascot size={180} mood="wave" style={{ marginBottom:24 }}/>
        <div style={{ textAlign:'center', padding:'0 32px' }}>
          <h1 style={{ fontSize:28, fontWeight:700, color:F.ink, lineHeight:1.3, marginBottom:10 }}>שלום\! אני פיני 👋</h1>
          <p style={{ fontSize:18, fontWeight:600, color:F.ink, marginBottom:8 }}>העוזר הכספי שלך</p>
          <p style={{ fontSize:15, color:F.inkSoft, lineHeight:1.6 }}>אעזור לך לנהל את הכסף שלך בצורה חכמה, פשוטה ואפילו כיפית</p>
        </div>
      </div>
      <div style={{ width:'100%', padding:'0 24px 50px', display:'flex', flexDirection:'column', gap:12 }}>
        <button onClick={() => nav('obGoal')} style={{ width:'100%', height:54, borderRadius:27, background:'#000', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:10, fontFamily:F.font }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm-1 14.5v-9l7 4.5-7 4.5z"/></svg>
          <span style={{ color:'#fff', fontSize:16, fontWeight:600 }}>המשך עם Apple</span>
        </button>
        <button onClick={() => nav('obGoal')} style={{ width:'100%', height:54, borderRadius:27, background:'#fff', border:`2px solid ${F.line}`, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:10, fontFamily:F.font }}>
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          <span style={{ color:F.ink, fontSize:16, fontWeight:600 }}>המשך עם Google</span>
        </button>
      </div>
    </div>
  );
}

// ==================== ONBOARDING GOAL ====================
function ObGoal({ nav }) {
  const [sel, setSel] = React.useState(1);
  const goals = [
